background {
  monitor =
  path = ~/1-vault/2-media/1-wallpapers/wpa.png
  blur_passes = 2
  blur_size = 4
  brightness = 0.5
}

input-field {
  monitor =
  size = 280, 48
  outline_thickness = 2
  dots_size = 0.25
  dots_spacing = 0.2
  outer_color = rgba(136, 192, 208, 0.6)
  inner_color = rgba(15, 15, 25, 0.9)
  font_color = rgb(205, 214, 244)
  fade_on_empty = true
  placeholder_text = <span foreground="##88c0d0">password</span>
  hide_input = false
  check_color = rgb(136, 192, 208)
  fail_color = rgb(210, 90, 90)
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  position = 0, -80
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M")"
  color = rgba(205, 214, 244, 0.9)
  font_size = 72
  font_family = Hack Nerd Font
  position = 0, 120
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
  color = rgba(166, 173, 200, 0.7)
  font_size = 16
  font_family = Hack Nerd Font
  position = 0, 40
  halign = center
  valign = center
}
